<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
font-family: Arial;
background: linear-gradient(to right,#4facfe,#00f2fe);
text-align:center;
margin:0;
}

.header{
background:#222;
color:white;
padding:15px;
font-size:24px;
}

.card{
background:white;
width:320px;
margin:100px auto;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff9800;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Student Management System</div>

<div class="card">
<h2>Welcome 🎉</h2>
<p>Login Successful</p>
<button onclick="logout()">Logout</button>
</div>

<script>
function logout(){
window.location.href="login.html";
}
</script>

</body>
</html>
